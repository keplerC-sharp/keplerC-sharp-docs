<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 180">
  <rect width="200" height="180" fill="none"/>
  <!-- Stars background -->
  <circle cx="30" cy="25" r="1.5" fill="#e8d5a3" opacity="0.7"/>
  <circle cx="80" cy="15" r="1" fill="#e8d5a3" opacity="0.9"/>
  <circle cx="150" cy="30" r="1.2" fill="#e8d5a3" opacity="0.6"/>
  <circle cx="170" cy="10" r="1.8" fill="#e8d5a3" opacity="0.8"/>
  <circle cx="50" cy="60" r="1" fill="#e8d5a3" opacity="0.5"/>
  <!-- Book/manuscript (Kepler's Astronomia Nova) -->
  <rect x="55" y="85" width="90" height="70" rx="3" fill="#8b6914" stroke="#c9a84c" stroke-width="1.5"/>
  <rect x="60" y="90" width="80" height="60" rx="2" fill="#f5e6c8"/>
  <!-- Text lines on book -->
  <line x1="68" y1="102" x2="132" y2="102" stroke="#8b6914" stroke-width="1.5"/>
  <line x1="68" y1="112" x2="132" y2="112" stroke="#8b6914" stroke-width="1.5"/>
  <line x1="68" y1="122" x2="120" y2="122" stroke="#8b6914" stroke-width="1.5"/>
  <line x1="68" y1="132" x2="128" y2="132" stroke="#8b6914" stroke-width="1.5"/>
  <!-- Orbital diagram on book -->
  <ellipse cx="100" cy="118" rx="25" ry="16" fill="none" stroke="#c9a84c" stroke-width="1.2"/>
  <circle cx="82" cy="118" r="4" fill="#c9a84c" opacity="0.8"/>
  <!-- Quill pen -->
  <line x1="125" y1="75" x2="155" y2="105" stroke="#c9a84c" stroke-width="2"/>
  <path d="M125,75 Q120,65 130,60 Q135,70 125,75" fill="#e8d5a3"/>
  <!-- Orbit arc above -->
  <path d="M 40,65 Q 100,20 160,65" fill="none" stroke="#c9a84c" stroke-width="2" opacity="0.5"/>
  <circle cx="160" cy="65" r="5" fill="#4a90d9"/>
</svg>
