  <ellipse cx="100" cy="95" rx="60" ry="38" fill="none" stroke="#c9a84c" stroke-width="1.5" opacity="0.6"/>
  <ellipse cx="100" cy="95" rx="35" ry="22" fill="none" stroke="#c9a84c" stroke-width="1.5" opacity="0.8"/>
  <!-- Sun -->
