<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 180">
  <rect width="200" height="180" fill="none"/>
  <!-- Elliptical orbit -->
  <ellipse cx="100" cy="90" rx="80" ry="50" fill="none" stroke="#c9a84c" stroke-width="2.5" stroke-dasharray="5,3"/>
  <!-- Sun at focus -->
  <circle cx="68" cy="90" r="12" fill="#c9a84c" opacity="0.9"/>
  <circle cx="68" cy="90" r="8" fill="#f4d03f"/>
  <!-- Planet -->
  <circle cx="178" cy="90" r="7" fill="#2c5f8a"/>
  <circle cx="178" cy="90" r="5" fill="#4a90d9"/>
  <!-- Focus point marker -->
  <circle cx="132" cy="90" r="2" fill="#c9a84c" opacity="0.5"/>
  <!-- Area sweep lines -->
  <line x1="68" y1="90" x2="155" y2="50" stroke="#c9a84c" stroke-width="1" opacity="0.4"/>
  <line x1="68" y1="90" x2="178" y2="90" stroke="#c9a84c" stroke-width="1" opacity="0.4"/>
</svg>
